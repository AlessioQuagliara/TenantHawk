<!-- Per rappresentare stati (es. attivo/inattivo, ruolo utente). -->

{% macro success(text, attrs={}) %}
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200" {{ attrs|xmlattr }}>
    {{ text }}
</span>
{% endmacro %}

{% macro warning(text, attrs={}) %}
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200" {{ attrs|xmlattr }}>
    {{ text }}
</span>
{% endmacro %}

{% macro danger(text, attrs={}) %}
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200" {{ attrs|xmlattr }}>
    {{ text }}
</span>
{% endmacro %}

{% macro info(text, attrs={}) %}
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200" {{ attrs|xmlattr }}>
    {{ text }}
</span>
{% endmacro %}
