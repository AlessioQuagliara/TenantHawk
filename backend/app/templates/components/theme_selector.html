<!-- backend/app/templates/components/theme_Selector-->
<!-- ======================================================================================= -->

<!-- Per selezione tema. -->

<button
    type="button"
    class="relative inline-flex h-8 w-14 items-center rounded-full px-1 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
    aria-label="Toggle dark mode"
    role="switch"
    x-data="{
      isDark: false,
      init() {
        const stored = localStorage.getItem('color-theme');
        if (stored) {
          this.isDark = stored === 'dark';
        } else {
          this.isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        this.apply();
      },
      apply() {
        if (this.isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      },
      toggle() {
        this.isDark = !this.isDark;
        localStorage.setItem('color-theme', this.isDark ? 'dark' : 'light');
        this.apply();
      }
    }"
    x-init="init()"
    @click="toggle()"
    :aria-checked="isDark"
    :class="isDark ? 'bg-gray-700' : 'bg-gray-100'"
>
    <span class="absolute left-2 text-yellow-500 dark:text-yellow-300" aria-hidden="true">
      <i class="ri-sun-line text-xs"></i>
    </span>
    <span class="absolute right-2 text-indigo-300 dark:text-indigo-200" aria-hidden="true">
      <i class="ri-moon-line text-xs"></i>
    </span>

    <span
      class="relative z-10 inline-flex h-6 w-6 items-center justify-center rounded-full bg-white shadow transform transition-transform duration-200"
      :class="isDark ? 'translate-x-6 text-indigo-600' : 'translate-x-0 text-yellow-500'"
    >
      <i x-show="!isDark" class="ri-sun-line text-sm" aria-hidden="true"></i>
      <i x-show="isDark" class="ri-moon-line text-sm" aria-hidden="true"></i>
    </span>
</button>
