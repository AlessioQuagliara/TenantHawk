<!-- backend/app/templates/base -->
<!-- ======================================================================================= -->
 
<!DOCTYPE html>
<html lang="{{ lang|default('it') }}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Gestionale{% endblock %}</title>
    <!-- Favicon-->
    <link rel="icon" type="image/png" href="{{ url_for('static', path='/images/favicon.png') }}">
    <!-- Icone Remix Icon locali -->
    <link rel="stylesheet" href="{{ url_for('static', path='/icon/remixicon.css') }}">
    <!-- Tailwind CSS CDN (o via file statico) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import eventuali utility (es. larghezze o colori personalizzati per i toast) -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <!-- Configurazione Tailwind per dark mode e colori personalizzati (primary) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js per interattività (opzionale, ma usato in toast/modali) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased">
    {% block body %}
        <!-- Header / Nav globale? Sarà definito nei template estesi -->
        <main>
            {% block content %}{% endblock %}
        </main>

        <!-- Footer globale opzionale -->
        {% block footer %}{% endblock %}

        <!-- Toast container (globale) -->
        <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
    {% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
