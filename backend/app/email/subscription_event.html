<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aggiornamento abbonamento</title>
  </head>
  <body style="margin:0; padding:0; background:#f4f6fb; font-family:Arial, Helvetica, sans-serif; color:#111827;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f4f6fb; padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px; background:#ffffff; border:1px solid #e5e7eb; border-radius:8px;">
            <tr>
              <td style="padding:24px; background:#1d4ed8; color:#ffffff; border-top-left-radius:8px; border-top-right-radius:8px;">
                <h1 style="margin:0; font-size:20px; line-height:1.3;">Aggiornamento abbonamento</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <p style="margin:0 0 12px;">Tenant: <strong>{{ nome_tenant }}</strong></p>
                <p style="margin:0 0 12px;">Operazione: <strong>{{ operazione }}</strong></p>
                <p style="margin:0 0 12px;">Stato: <strong>{{ stato }}</strong></p>
                <p style="margin:0 0 16px;">Piano: <strong>{{ piano }}</strong></p>
                {% if dettagli %}
                  <div style="margin:0 0 16px; border:1px solid #dbeafe; background:#eff6ff; border-radius:6px; padding:12px;">
                    <p style="margin:0; font-size:14px; line-height:1.5;">{{ dettagli }}</p>
                  </div>
                {% endif %}
                <p style="margin:0; font-size:13px; color:#6b7280;">
                  Questa è una notifica automatica relativa al ciclo di vita dell'abbonamento.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
