<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conferma account</title>
  </head>
  <body style="margin:0; padding:0; background:#f4f6fb; font-family:Arial, Helvetica, sans-serif; color:#111827;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f4f6fb; padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px; background:#ffffff; border:1px solid #e5e7eb; border-radius:8px;">
            <tr>
              <td style="padding:24px; background:#059669; color:#ffffff; border-top-left-radius:8px; border-top-right-radius:8px;">
                <h1 style="margin:0; font-size:22px; line-height:1.3;">Conferma il tuo account</h1>
                <p style="margin:8px 0 0; font-size:14px; opacity:0.95;">{{ nome_tenant }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <p style="margin:0 0 16px; font-size:15px; line-height:1.6;">
                  Per completare la registrazione, conferma il tuo indirizzo email.
                </p>
                <p style="margin:0 0 24px;">
                  <a href="{{ conferma_link }}" style="display:inline-block; background:#059669; color:#ffffff; text-decoration:none; padding:12px 20px; border-radius:6px; font-weight:700;">
                    Conferma account
                  </a>
                </p>
                <p style="margin:0 0 8px; font-size:13px; color:#6b7280;">
                  Se il pulsante non funziona, copia questo link:
                </p>
                <p style="margin:0; font-size:13px; line-height:1.5; word-break:break-all; color:#065f46;">
                  {{ conferma_link }}
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px; border-top:1px solid #e5e7eb; font-size:12px; color:#6b7280;">
                Questo link scade entro 24 ore.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
